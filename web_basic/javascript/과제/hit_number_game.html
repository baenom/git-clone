<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let min = 1
        let max = 100
        let num_list = []
        const rand = Math.floor(Math.random() * 100) + 1
        function game(){
            // document.write(`현재 범위 :${min}~${max}<br>`)
            console.log(`현재 범위 :${min}~${max}`)
            let num = Number(prompt("숫자를 입력하세요 : "))
            num_list.push(num)
            if(num <= max && num >= min){
                if(rand < num){
                    // document.write('DOWN!<br>')
                    console.log('DOWN!')
                    max = num-1
                }else if(rand > num){
                    // document.write('UP!<br>')
                    console.log('UP!')
                    min = num+1
                }else{
                    // document.write('정답입니다!<br>')
                    console.log('정답입니다!')
                    // document.write(`입력 기록 : ${num_list}`)
                    console.log(`입력 기록 : ${num_list}`)
                    // document.write(`총 시도 횟수 : ${num_list.length}<br>`)
                    console.log(`총 시도 횟수 : ${num_list.length}`)
                }
            }else{
                // document.write('범위 안의 숫자를 입력하세요!<br>')
                console.log('범위 안의 숫자를 입력하세요!')
            }

        }
    </script>
</head>
<body>
    <button onclick="game()">Click me</button>
</body>
</html>
