<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const num = prompt("숫자를 입력하세요 : ");
        for(let i = 0 ; i < num ; i++){
            let number = String(i+1)
            for(let j = 0 ; j < number.length; j++){
                if(number[number.length - 1] != 0 && (number[j] == 3 || number[j] == 6 || number[j] == 9)){
                    document.write('짝')
                }else if(number[number.length - 1] == 0 && number[j] != 3){
                    for(let k = 0 ; k < number[0]; k++){
                        document.write('뽀')
                    }
                    document.write('숑')
                    document.write('<br>')
                    break
                }else if(number[number.length - 1] == 0 && (number[j] == 3 || number[j] == 6 || number[j] == 9)){
                    for(let k = 0 ; k < number[0]; k++){
                        document.write('뽀')
                    }
                    document.write('짝')
                    document.write('숑')
                    document.write('<br>')
                    break
                }else{
                    document.write(i+1)
                    document.write('<br>')
                    break
                }
                document.write('<br>')
                
            }
        }
    </script>
</head>
<body>
    
</body>
</html>
