<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        for(let i = 0 ; i <= 5 ;i ++){
            document.write('<h3>hello_print</h3>')
        }
        let cnt = 0
        while(true){
            ++ cnt
            document.write('<h3>hello_while</h3>')

            if(cnt == 5){
                break
            }
        }
    </script>
</head>
<body>
    
</body>
</html>
