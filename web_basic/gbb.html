<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>컴퓨터 가위바위보 (5:5 전략 모드)</title>
    <style>
        body { background-color: black; color: white; text-align: center; font-family: sans-serif; }
        #wrapper { max-width: 600px; margin: 0 auto; padding: 20px; }
        #webcam-container { margin: 20px 0; border: 5px solid #333; display: inline-block; border-radius: 10px; overflow: hidden; }
        #countdown { font-size: 80px; color: yellow; height: 100px; font-weight: bold; text-shadow: 2px 2px 10px rgba(255,255,0,0.5); }
        #game-result { font-size: 35px; margin: 20px 0; min-height: 120px; border-radius: 10px; padding: 10px; background: #111; }
        #score-board { font-size: 22px; color: #00ffff; background: #222; padding: 15px; border-radius: 5px; border: 1px solid #444; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; margin: 5px; border-radius: 5px; border: none; font-weight: bold; }
        .btn-start { background-color: #444; color: white; }
        .btn-game { background-color: #ff4757; color: white; }
        #label-container div { padding: 8px; margin: 4px; border-radius: 4px; font-size: 18px; }
        #ai-status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="wrapper">
    <h2>자동 가위바위보 (학습형 5:5)</h2>
    <button type="button" class="btn-start" onclick="init()">카메라 켜기 (Start)</button>
    <button type="button" class="btn-game" onclick="startGame()">게임 시작 (3초)</button>

    <div id="countdown"></div>
    <div id="webcam-container"></div>
    
    <div id="game-result">'게임 시작'을 눌러 컴퓨터와 대결하세요!</div>
    
    <div id="score-board">
        가위: 0 | 바위: 0 | 보: 0
    </div>
    <div id="ai-status">데이터 수집 중... (10판 이후부터 전략 적용)</div>

    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/BYeHfyXCu/";

    let model, webcam, labelContainer, maxPredictions;
    let scores = [0, 0, 0]; // 사용자가 낸 [가위, 바위, 보] 누적 횟수
    let totalGames = 0;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(400, 400, flip); 
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = ""; 
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const prob = parseFloat(prediction[i].probability.toFixed(2));
            const target = labelContainer.childNodes[i];
            target.innerHTML = `${prediction[i].className}: ${prob}`;
            if (prob >= 0.6) {
                target.style.backgroundColor = "yellow";
                target.style.color = "red";
            } else {
                target.style.backgroundColor = "#222";
                target.style.color = "white";
            }
        }
    }

    function startGame() {
        if (!webcam) { alert("먼저 '카메라 켜기'를 눌러주세요!"); return; }
        let count = 3;
        const countdownEl = document.getElementById("countdown");
        const timer = setInterval(() => {
            countdownEl.innerText = count;
            count--;
            if (count < 0) {
                clearInterval(timer);
                countdownEl.innerText = "GO!";
                evaluateGame(); 
            }
        }, 1000);
    }

    async function evaluateGame() {
        const prediction = await model.predict(webcam.canvas);
        const resultEl = document.getElementById("game-result");
        const scoreEl = document.getElementById("score-board");
        const aiStatusEl = document.getElementById("ai-status");

        let userHandIdx = -1;
        for (let i = 0; i < maxPredictions; i++) {
            if (parseFloat(prediction[i].probability) >= 0.6) {
                userHandIdx = i;
                break;
            }
        }

        let computer;
        const randomChance = Math.random(); // 0~1 사이 난수

        // --- 5:5 전략 로직 ---
        if (totalGames >= 10 && randomChance < 0.5) {
            // 1. 전략 모드 (50% 확률): 사용자가 가장 많이 낸 패를 이기는 패 선택
            let mostFrequentIdx = scores.indexOf(Math.max(...scores));
            computer = (mostFrequentIdx + 1) % 3; // 가위(0)->바위(1), 바위(1)->보(2), 보(2)->가위(0)
            aiStatusEl.innerText = "전략 모드: 당신의 패턴을 분석하여 대응했습니다. (50% 확률)";
            aiStatusEl.style.color = "#ff9f43";
        } else {
            // 2. 랜덤 모드 (데이터 부족하거나 50% 확률): 완전 무작위
            computer = Math.floor(Math.random() * 3);
            if (totalGames < 10) {
                aiStatusEl.innerText = `데이터 수집 중... (${totalGames}/10)`;
            } else {
                aiStatusEl.innerText = "랜덤 모드: 예측할 수 없는 패를 냈습니다. (50% 확률)";
                aiStatusEl.style.color = "#00ffff";
            }
        }

        const handNames = ["가위", "바위", "보"];
        const computerHand = handNames[computer];
        let finalResult = "인식 실패";

        if (userHandIdx !== -1) {
            totalGames++;
            if (userHandIdx <= 2) scores[userHandIdx]++; 
            
            if (userHandIdx === 0) { // 가위
                finalResult = (computer === 0) ? "무승부" : (computer === 1 ? "패배" : "승리");
            } else if (userHandIdx === 1) { // 바위
                finalResult = (computer === 0) ? "승리" : (computer === 1 ? "무승부" : "패배");
            } else if (userHandIdx === 2) { // 보
                finalResult = (computer === 0) ? "패배" : (computer === 1 ? "승리" : "무승부");
            } else if (userHandIdx === 3) { // 기권
                finalResult = "기권 패배";
            }
        }

        resultEl.innerHTML = `
            <div style="font-size: 20px; color: #aaa;">${totalGames}회차 | 컴퓨터: [${computerHand}]</div>
            <div style="font-size: 55px; font-weight: bold; color: ${finalResult === '승리' ? '#00FF00' : (finalResult === '무승부' ? 'white' : 'red')};">${finalResult}</div>
        `;
        scoreEl.innerHTML = `가위: ${scores[0]} | 바위: ${scores[1]} | 보: ${scores[2]}`;
    }
</script>
</body>
</html>
