<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마당서점 - 사용자 상세조회 기능 통합판</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f5f6fa; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .container { max-width: 850px; margin: 30px auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        nav { display: none; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        nav button { padding: 10px 15px; border: none; background: #95a5a6; color: white; border-radius: 5px; cursor: pointer; }
        nav button.active { background: #2980b9; }
        #admin-menu-btn { background: #c0392b; display: none; }

        .section { display: none; }
        .active-section { display: block; }
        
        input, textarea, select { display: block; width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #2980b9; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-link { background: none; color: #2980b9; text-decoration: underline; font-size: 0.9em; margin-top: 10px; }

        .book-card { border: 1px solid #eee; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .book-info-area { cursor: pointer; flex: 1; display: flex; align-items: center; gap: 15px; }
        .book-thumb { width: 50px; height: 70px; background: #eee; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 450px; border-radius: 10px; position: relative; }
        .modal-cover { width: 150px; height: 210px; background: #f0f0f0; margin: 0 auto 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; }
        .out-of-stock { color: #e74c3c; font-weight: bold; font-size: 0.85em; }
    </style>
</head>
<body>

<header><h1>마당서점 (Madang Bookstore)</h1></header>

<div class="container">
    <nav id="main-nav">
        <button id="nav-home" class="active" onclick="changeTab('home')">홈/쇼핑</button>
        <button id="nav-cart" onclick="changeTab('cart')">장바구니</button>
        <button id="admin-menu-btn" onclick="changeTab('admin')">관리자 시스템</button>
        <button onclick="location.reload()" style="margin-left:auto; background:#636e72;">로그아웃</button>
    </nav>

    <div id="login-section" class="section active-section">
        <div style="max-width: 350px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px;">
            <h3 style="text-align: center;">로그인</h3>
            <input type="text" id="login-id" placeholder="아이디 (관리자: admin)">
            <input type="password" id="login-pw" placeholder="비밀번호 (관리자: admin123)">
            <button class="btn btn-primary" onclick="handleLogin()">로그인</button>
            <button class="btn btn-link" onclick="showAuthPage('signup')">회원가입 하러가기</button>
        </div>
    </div>

    <div id="signup-section" class="section">
        <div style="max-width: 350px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px;">
            <h3 style="text-align: center;">회원가입</h3>
            <input type="text" id="reg-id" placeholder="사용할 아이디">
            <input type="password" id="reg-pw" placeholder="비밀번호">
            <input type="text" id="reg-addr" placeholder="배송지 주소 (필수)">
            <button class="btn btn-primary" onclick="handleSignUp()">가입 완료</button>
            <button class="btn btn-link" onclick="showAuthPage('login')">로그인으로 돌아가기</button>
        </div>
    </div>

    <div id="home-section" class="section">
        <h3 id="welcome-msg">도서 목록 (클릭 시 상세 정보 확인)</h3>
        <div id="user-book-list"></div>
    </div>

    <div id="cart-section" class="section">
        <h3>내 장바구니</h3>
        <div id="cart-items"></div>
        <div id="order-box" style="display:none; padding:15px; background:#f8f9fa; border-top: 2px solid #ddd; margin-top: 20px;">
            <p><strong>최종 배송지:</strong> <span id="display-addr"></span></p>
            <button class="btn btn-primary" style="background:#27ae60;" onclick="placeOrder()">구매 완료하기</button>
        </div>
    </div>

    <div id="admin-section" class="section">
        <h3 style="color:#c0392b;">관리 시스템</h3>
        <div style="background: #fff5f5; padding: 20px; border: 1px solid #fab1a0; border-radius: 8px; margin-bottom: 25px;">
            <h4>➕ 도서 신규 추가</h4>
            <input type="text" id="add-title" placeholder="도서 제목">
            <input type="number" id="add-price" placeholder="가격">
            <textarea id="add-desc" placeholder="도서 상세 설명 및 표지 정보"></textarea>
            <button class="btn btn-danger" onclick="adminAddBook()">도서 등록</button>
        </div>
        <h4>도서 관리 목록</h4>
        <div id="admin-book-list"></div>
    </div>
</div>

<div id="book-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title" style="margin-top:0;"></h2>
        
        <div class="modal-cover" id="modal-cover-img">표지 이미지</div>
        
        <div id="detail-view">
            <p id="modal-desc" style="color:#555; min-height: 50px;"></p>
            <p id="modal-price" style="font-size: 1.2em; font-weight: bold;"></p>
            <button id="modal-cart-btn" class="btn btn-primary">장바구니에 담기</button>
        </div>

        <div id="admin-edit-view" style="display:none; border-top: 2px dashed #eee; padding-top:15px;">
            <label>설명 및 표지정보 수정</label>
            <textarea id="edit-desc" rows="4"></textarea>
            <label>판매 상태</label>
            <select id="edit-status">
                <option value="true">판매 중</option>
                <option value="false">품절</option>
            </select>
            <button class="btn btn-danger" onclick="saveChanges()">정보 저장</button>
            <button class="btn" style="background:#e74c3c; margin-top:10px;" onclick="adminDeleteBook()">도서 삭제</button>
        </div>

        <button class="btn" style="background:#636e72; color:white; margin-top:15px;" onclick="closeModal()">닫기</button>
    </div>
</div>

<script>
    let userDB = [{ id: "user1", pw: "1234", addr: "서울시 마포구" }];
    let books = [
        { id: 1, title: "파이썬 알고리즘", price: 25000, inStock: true, desc: "배의진 저 | 알고리즘 기초부터 실전까지 한 권으로 끝내기" },
        { id: 2, title: "네오소울 기타 교본", price: 22000, inStock: true, desc: "도정모 강사 | 소울풀한 리듬과 화성을 익히는 실전 레슨" }
    ];
    let cart = [];
    let currentUser = null;
    let currentBookId = null;

    function showAuthPage(type) {
        document.getElementById('login-section').classList.remove('active-section');
        document.getElementById('signup-section').classList.remove('active-section');
        document.getElementById(type + '-section').classList.add('active-section');
    }

    function handleSignUp() {
        const id = document.getElementById('reg-id').value;
        const pw = document.getElementById('reg-pw').value;
        const addr = document.getElementById('reg-addr').value;
        if(!id || !pw || !addr) return alert("필수 정보를 모두 입력하세요.");
        userDB.push({ id, pw, addr });
        alert("가입 성공! 로그인 하세요.");
        showAuthPage('login');
    }

    function handleLogin() {
        const id = document.getElementById('login-id').value;
        const pw = document.getElementById('login-pw').value;

        if(id === "admin" && pw === "admin123") {
            currentUser = { id: "관리자", isAdmin: true };
            document.getElementById('admin-menu-btn').style.display = 'block';
            enterApp('admin');
        } else {
            const user = userDB.find(u => u.id === id && u.pw === pw);
            if(user) { currentUser = { ...user, isAdmin: false }; enterApp('home'); }
            else { alert("계정 정보가 틀립니다."); }
        }
    }

    function enterApp(tab) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('signup-section').style.display = 'none';
        document.getElementById('main-nav').style.display = 'flex';
        changeTab(tab);
    }

    function changeTab(tab) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + '-section').classList.add('active-section');
        if(document.getElementById('nav-'+tab)) document.getElementById('nav-'+tab).classList.add('active');
        if(tab === 'admin') document.getElementById('admin-menu-btn').classList.add('active');

        if(tab === 'home') renderUserBooks();
        if(tab === 'admin') renderAdminBooks();
        if(tab === 'cart') renderCart();
    }

    // [유저] 도서 목록 렌더링
    function renderUserBooks() {
        const list = document.getElementById('user-book-list');
        list.innerHTML = books.map(b => `
            <div class="book-card">
                <div class="book-info-area" onclick="openBookModal(${b.id}, false)">
                    <div class="book-thumb">표지</div>
                    <div>
                        <strong>${b.title}</strong> ${b.inStock ? '' : '<span class="out-of-stock">[품절]</span>'}<br>
                        <small style="color:#888;">${b.price.toLocaleString()}원</small>
                    </div>
                </div>
                <button class="btn btn-primary" style="width:70px;" ${b.inStock ? `onclick="addToCart(${b.id})"` : 'disabled'}>
                    ${b.inStock ? '담기' : '매진'}
                </button>
            </div>
        `).join('');
    }

    // [상세보기/수정 모달] 열기
    function openBookModal(id, isAdminMode) {
        const b = books.find(x => x.id === id);
        currentBookId = id;
        document.getElementById('modal-title').innerText = b.title;
        document.getElementById('modal-desc').innerText = b.desc;
        document.getElementById('modal-price').innerText = `${b.price.toLocaleString()}원`;
        document.getElementById('modal-cover-img').innerText = b.title + " 표지";
        
        const cartBtn = document.getElementById('modal-cart-btn');
        cartBtn.onclick = () => addToCart(id);
        cartBtn.style.display = b.inStock && !isAdminMode ? 'block' : 'none';

        if(isAdminMode) {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('admin-edit-view').style.display = 'block';
            document.getElementById('edit-desc').value = b.desc;
            document.getElementById('edit-status').value = b.inStock.toString();
        } else {
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('admin-edit-view').style.display = 'none';
        }
        document.getElementById('book-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('book-modal').style.display = 'none'; }

    // [관리자] 기능
    function renderAdminBooks() {
        const list = document.getElementById('admin-book-list');
        list.innerHTML = books.map(b => `
            <div class="book-card admin-book-item" onclick="openBookModal(${b.id}, true)">
                <span>[${b.id}] <b>${b.title}</b></span>
                <span>${b.inStock ? '판매중' : '<span class="out-of-stock">품절</span>'}</span>
            </div>
        `).join('');
    }

    function adminAddBook() {
        const title = document.getElementById('add-title').value;
        const price = document.getElementById('add-price').value;
        const desc = document.getElementById('add-desc').value;
        if(!title || !price) return alert("제목과 가격을 입력하세요.");
        books.push({ id: Date.now(), title, price: parseInt(price), desc, inStock: true });
        renderAdminBooks(); alert("도서가 등록되었습니다.");
    }

    function saveChanges() {
        const b = books.find(x => x.id === currentBookId);
        b.desc = document.getElementById('edit-desc').value;
        b.inStock = document.getElementById('edit-status').value === "true";
        alert("수정 완료!"); closeModal(); renderAdminBooks();
    }

    function adminDeleteBook() {
        if(confirm("이 도서를 시스템에서 완전히 삭제할까요?")) {
            books = books.filter(x => x.id !== currentBookId);
            closeModal(); renderAdminBooks();
        }
    }

    // [기타 공통]
    function addToCart(id) {
        const b = books.find(x => x.id === id);
        cart.push(b); alert(`'${b.title}' 장바구니 추가!`);
    }

    function renderCart() {
        const list = document.getElementById('cart-items');
        const box = document.getElementById('order-box');
        if(cart.length === 0) { list.innerHTML = "<p>비어있음</p>"; box.style.display = 'none'; }
        else {
            list.innerHTML = cart.map(c => `<div class="book-card">${c.title} - ${c.price.toLocaleString()}원</div>`).join('');
            document.getElementById('display-addr').innerText = currentUser.addr || "관리자";
            box.style.display = 'block';
        }
    }

    function placeOrder() { alert(`${currentUser.addr}로 배송 예정입니다!`); cart = []; changeTab('home'); }
</script>
</body>
</html>
